<VirtualHost *:80>
    ServerName alexandrya.aquarius.irish

    DocumentRoot /var/www/alexandrya

    <Directory /var/www/alexandrya>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /index.html
    </Directory>

    ProxyPreserveHost On
    ProxyRequests Off

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    ProxyPass /api/ http://127.0.0.1:4000/api/
    ProxyPassReverse /api/ http://127.0.0.1:4000/api/

    ProxyPass /covers/ http://127.0.0.1:4000/covers/
    ProxyPassReverse /covers/ http://127.0.0.1:4000/covers/

    ErrorLog ${APACHE_LOG_DIR}/alexandrya_error.log
    CustomLog ${APACHE_LOG_DIR}/alexandrya_access.log combined
</VirtualHost>
