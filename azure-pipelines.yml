trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  name: vps-alexandrya

variables:
  nodeVersion: '22.x'
  dockerRegistryServiceConnection: 'dockerhub-alexandrya'
  dockerRepository: 'codinaaranxa/alexandrya-api'
  frontendDistPath: 'frontend/dist/frontend/browser'
  frontendDeployPath: '/var/www/alexandrya'
  deployFrontendToApache: 'false'

stages:
  - stage: build_test_publish
    displayName: Build, test and publish
    jobs:
      - job: build
        displayName: Build Alexandrya
        steps:
          - checkout: self
            clean: true

          - task: NodeTool@0
            displayName: Use Node.js $(nodeVersion)
            inputs:
              versionSpec: $(nodeVersion)

          - script: npm ci
            displayName: Install dependencies

          - script: npm run build
            displayName: Build backend and frontend

          - script: npm test --workspace frontend -- --watch=false
            displayName: Test frontend

          - task: Docker@2
            displayName: Build and push API image
            inputs:
              command: buildAndPush
              containerRegistry: $(dockerRegistryServiceConnection)
              repository: $(dockerRepository)
              dockerfile: backend/Dockerfile
              buildContext: .
              tags: |
                $(Build.SourceVersion)
                latest

          - script: |
              set -euo pipefail
              rm -rf "$(Build.ArtifactStagingDirectory)/frontend"
              mkdir -p "$(Build.ArtifactStagingDirectory)/frontend"
              cp -a "$(frontendDistPath)/." "$(Build.ArtifactStagingDirectory)/frontend/"
            displayName: Prepare frontend artifact

          - task: PublishPipelineArtifact@1
            displayName: Publish frontend artifact
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/frontend'
              artifact: alexandrya-frontend

          - script: |
              set -euo pipefail
              mkdir -p "$(frontendDeployPath)"
              rsync -a --delete "$(frontendDistPath)/" "$(frontendDeployPath)/"
            displayName: Deploy frontend to Apache
            condition: and(succeeded(), eq(variables.deployFrontendToApache, 'true'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
