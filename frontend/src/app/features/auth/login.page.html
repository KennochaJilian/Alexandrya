<main class="login-shell">
  <section class="brand" aria-label="Alexandrya">
    <img
      class="brand-art"
      src="/assets/alexandrya-login-logo.webp"
      alt="Alexandrya, votre bibliotheque, vos histoires."
    />
  </section>

  <form class="login-panel" [formGroup]="form" (ngSubmit)="submit()">
    <h1>Connexion a votre compte</h1>

    <label class="field">
      <span>Email</span>
      <span class="control">
        <svg lucideMail aria-hidden="true" [size]="18"></svg>
        <input type="email" autocomplete="email" formControlName="email" placeholder="votre@email.com" />
      </span>
    </label>

    <label class="field">
      <span>Mot de passe</span>
      <span class="control">
        <svg lucideLockKeyhole aria-hidden="true" [size]="18"></svg>
        <input type="password" autocomplete="current-password" formControlName="password" placeholder="Mot de passe" />
        <svg lucideEyeOff class="control-trailing" aria-hidden="true" [size]="18"></svg>
      </span>
    </label>

    <label class="remember">
      <input type="checkbox" formControlName="remember" />
      <span>Se souvenir de moi</span>
    </label>

    @if (error()) {
      <p class="error" role="alert">{{ error() }}</p>
    }

    <button type="submit" [disabled]="isSubmitting()">
      @if (isSubmitting()) {
        <app-leaf-spinner [compact]="true" label="Connexion"></app-leaf-spinner>
      } @else {
        <svg lucideArrowRight aria-hidden="true" [size]="20"></svg>
      }
      <span>{{ isSubmitting() ? 'Connexion...' : 'Se connecter' }}</span>
    </button>
  </form>

  <footer class="app-footer">
    <span>Mentions legales</span>
    <span>&copy; 2026 - Aquarius</span>
  </footer>
</main>
